  <style>
    body {

    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .container {
      padding: 30px;
    }

    h2 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px;
      text-align: center;
    }

    th {
      background: #6366f1;
      color: white;
    }

    tr:nth-child(even) {
      background: #f3f4f6;
    }
  </style>
</head>
