
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lumi Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .logo img {
      width: 300px;
      border-radius: 50%;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #8b5cf6;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #6366f1, #a855f7);
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-size: 15px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .link {
      margin-top: 15px;
      cursor: pointer;
      color: #8b5cf6;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="login-container">

  <div class="logo">
    <img src="img/logo.jpeg">
    
  </div>

  <h2>Iniciar sesión</h2>

  <input type="email" id="email" placeholder="Correo electrónico">
  <input type="password" id="password" placeholder="Contraseña">

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn" onclick="register()">Registrarse</button>

  
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCqm-ifnDLIYLlZBafR-wIO87CqTIh9zd0",
    authDomain: "yassin-lerma.firebaseapp.com",
    projectId: "yassin-lerma",
    storageBucket: "yassin-lerma.firebasestorage.app",
    messagingSenderId: "854070019092",
    appId: "1:854070019092:web:11585b434dd224ff519301",
    measurementId: "G-K38ZF10HD8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // LOGIN
  window.login = function() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, pass)
      .then(() => {
        alert("✅ Bienvenido");
        window.location.href = "dash.html";
      })
      .catch(err => alert("❌ " + err.message));
  }

  // REGISTRO
  window.register = function() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, pass)
      .then(() => alert("✅ Usuario creado"))
      .catch(err => alert("❌ " + err.message));
  }

</script>

</body>
</html>
