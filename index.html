<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial BPM</title>

<style>
  body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
  }

  h1{ margin-top:30px; }

  .list{
    width:300px;
    margin:auto;
    margin-top:20px;
  }

  .item{
    background:#1e293b;
    margin:10px;
    padding:10px;
    border-radius:10px;
    font-size:20px;
  }
</style>
</head>

<body>

<h1>📊 Historial de BPM</h1>
<div class="list" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCqm-ifnDLIYLlZBafR-wIO87CQTIh9zd0",
  authDomain: "yassin-lerma.firebaseapp.com",
  databaseURL: "https://yassin-lerma-default-rtdb.firebaseio.com",
  projectId: "yassin-lerma",
  storageBucket: "yassin-lerma.firebasestorage.app",
  messagingSenderId: "854070019092",
  appId: "1:854070019092:web:11585b434dd224ff519301"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const refLogs = ref(db, "bpmLogs");

onValue(refLogs, (snapshot) => {
  const data = snapshot.val();
  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  for (let id in data) {
    let bpm = data[id].bpm;

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "❤️ BPM: " + bpm;

    lista.appendChild(div);
  }
});

</script>

</body>
</html>
