<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor BPM Firebase</title>

<style>
  body{
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin-top: 80px;
  }

  .card{
    background:#1e293b;
    width:300px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px #000;
  }

  .bpm{
    font-size:60px;
    font-weight:bold;
    color:#22c55e;
  }
</style>
</head>

<body>

<h1>📡 Monitor de Ritmo Cardíaco</h1>

<div class="card">
  <p>Frecuencia Cardiaca</p>
  <div class="bpm" id="bpm">--</div>
  <p>latidos por minuto</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // 🔥 TU CONFIG DE FIREBASE
  const firebaseConfig = {
    databaseURL: "https://yassin-lerma-default-rtdb.firebaseio.com"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 🔁 leer en tiempo real
  const bpmRef = db.ref("bpm");

  bpmRef.on("value", (snapshot) => {
    const data = snapshot.val();
    document.getElementById("bpm").innerText = data;
  });

</script>

</body>
</html>
