<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor BPM Firebase</title>

<style>
  body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin-top:80px;
  }

  .card{
    background:#1e293b;
    width:300px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px black;
  }

  .bpm{
    font-size:60px;
    font-weight:bold;
    color:#22c55e;
  }
</style>
</head>

<body>

<h1>📡 Monitor BPM</h1>

<div class="card">
  <p>Frecuencia Cardiaca</p>
  <div class="bpm" id="bpm">--</div>
  <p>latidos por minuto</p>
</div>

<script type="module">
  // Firebase v9 modular
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  // TU CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCqm-ifnDLIYLlZBafR-wIO87CQTIh9zd0",
    authDomain: "yassin-lerma.firebaseapp.com",
    databaseURL: "https://yassin-lerma-default-rtdb.firebaseio.com",
    projectId: "yassin-lerma",
    storageBucket: "yassin-lerma.firebasestorage.app",
    messagingSenderId: "854070019092",
    appId: "1:854070019092:web:11585b434dd224ff519301",
    measurementId: "G-K38ZF10HD8"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🔥 Ruta donde ESP32 guarda el BPM
  const bpmRef = ref(db, "bpm");

  onValue(bpmRef, (snapshot) => {
    const data = snapshot.val();
    document.getElementById("bpm").innerText = data;
  });

</script>

</body>
</html>
